<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Portal SocialSelling{% endblock %}</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid #ccc; padding-bottom: 0.75rem; }
    nav a { text-decoration: none; color: #0066cc; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; background: #eee; }
    .badge-novo { background: #ddf; }
    .badge-terminal { background: #fdd; }
    .badge-acompanhamento { background: #ffd; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #eee; }
    th { background: #f5f5f5; }
    .driver-positive { color: #1a7a1a; }
    .driver-negative { color: #aa2200; }
    .missing { color: #888; font-style: italic; }
    button, select { padding: 4px 12px; cursor: pointer; }
    form { display: inline; }
  </style>
</head>
<body>
  <nav>
    <a href="/carteira">Carteira</a>
    <form method="post" action="/logout"><button type="submit">Sair</button></form>
  </nav>
  {% block content %}{% endblock %}
</body>
</html>
