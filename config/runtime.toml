# Parametros de runtime do PoC. Valores default documentados (ADR-000 / roadmap Fase 0).
# Nenhum segredo aqui — chaves de API ficam no .env.

[cache]
# TTL do cache frio de chamadas externas (T-24h). Ver SDD v1.0 secao 1.4.
ttl_hours = 24

[finops]
# Limiar minimo de P_score abaixo do qual o lead e podado (Progressive Early Termination).
tau_finops = 0.60
# Fator de penalidade aplicado ao C_score quando qualquer sensor opera DEGRADED (0,1).
kappa_degraded = 0.80

[scoring]
# Fórmula linear do PoC: P = (w_fit * Fit + w_intent * Intent) * (Confianca ^ confidence_exponent)
w_fit = 0.60
w_intent = 0.40
confidence_exponent = 0.5
# Pesos internos do Fit (tech vs industria) e normalizador do proxy de Intent (PoC).
w_fit_tech = 0.60
w_fit_industry = 0.40
intent_evidence_norm = 5

[persona]
# Multiplicador de aderencia de persona (publico = fundadoras mulheres de servicos).
# Homem -> 0 (cai fora do topo); conta de empresa -> penalizada; fundadora -> cheio.
fundadora = 1.0
indefinido = 0.5
empresa = 0.35
fundador = 0.0

[tavily]
max_queries = 3
max_results = 10
search_depth = "basic"
# Termo de persona injetado nas queries (publico Talita = fundadoras de servicos).
persona_term = "fundadora"
# Vies de dominio: prioriza perfis sociais onde o decisor e achavel (Instagram > LinkedIn).
include_domains = ["instagram.com", "linkedin.com"]

[gemini]
model = "gemini-2.5-flash-lite"
max_retries = 3
backoff_base_seconds = 2
timeout_seconds = 120
# Reforma cognitiva (ADR-005). batch_size = nº max de evidências por chamada Gemini
# (>= total do run => 1 lote = prompt idêntico ao atual, paridade). Para VOLUME, lotes
# menores cabem no timeout (L-016) e elevam o teto. RPD = orçamento de requisições/dia.
batch_size = 50
rpd_enabled = false
rpd_cap = 1000
rpd_ledger_path = "data/gemini_request_ledger.json"

[apollo]
# 2o sensor firmografico OPCIONAL (ADR-004). Opt-in: requer enabled=true + APOLLO_API_KEY.
# Desligado (default) => pipeline byte-identico ao atual (invariante de paridade).
enabled = false
base_url = "https://api.apollo.io/api/v1"
ledger_path = "data/apollo_credit_ledger.json"
# Teto extra de quantos leads revelar contato (degrau 3), alem do limite de credito.
reveal_top_n = 20
# Cache por volatilidade do dado (economiza credito; SDD §2): firmografia 30d, contato 90d.
org_enrich_ttl_hours = 720
reveal_ttl_hours = 2160
# Limite defensivo de req/min (backoff cobre o resto; limites por tier nao sao publicados).
per_minute_limit = 50

[apollo.caps]
# Orcamento mensal do tier gratuito (premissa 2026, ver ADR-004 §0). Reconciliavel via 402.
data_credits_cap = 100
email_credits_cap = 100  # conservador (dominio pessoal); 10000 se dominio corporativo
mobile_credits_cap = 5

[corpus]
# Corpus de leads ACUMULATIVO (ADR-006). enabled=true faz os runs acumularem entre si
# (upsert idempotente por entity_id) em vez de sobrescrever, e a busca vira INCREMENTAL:
# cada execucao avanca a "onda" (waves_path) variando as queries p/ trazer leads NOVOS.
# Ranking passa a ser sobre o corpus inteiro, ordenado por score.
enabled = true
path = "data/corpus/leads_corpus.json"
waves_path = "data/corpus/waves.json"

[learning]
# Aprendizado por feedback like/dislike (ADR-007). enabled=true faz a operadora
# reajustar os pesos do score marcando leads. So atua no endpoint de feedback —
# NAO altera a saida do pipeline (paridade do smoke preservada). Travas de auto-apply:
# so reajusta com >= min_likes E >= min_dislikes; L2 + shrinkage + clamp estabilizam.
enabled = true
feedback_path = "data/feedback.json"
min_likes = 3
min_dislikes = 3
l2 = 0.1
epochs = 500
lr = 0.5
shrinkage_max = 0.5
shrinkage_ref = 20

[runtime]
# Limite de leads por ciclo no PoC (controle de custo/latencia).
# Com [corpus].enabled=true vira limite de EXIBICAO (nao de volume conhecido).
max_leads_per_cycle = 50
